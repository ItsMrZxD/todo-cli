# Continuous integration: build, run the unit tests, then drive the real
# binary through a scripted add/list/quit session — on Linux and Windows.
name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            flags: ""
          # Static linking on Windows: the runner's PATH mixes several MinGW
          # toolchains, so a dynamically linked exe can load a mismatched
          # libstdc++ DLL at runtime and crash.
          - os: windows-latest
            flags: "-static"

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v7

      - name: Toolchain info
        run: g++ --version

      - name: Build
        run: g++ -std=c++11 -Wall -Wextra -O2 ${{ matrix.flags }} -o todo main.cpp

      - name: Unit tests
        run: |
          g++ -std=c++11 -Wall -Wextra -O2 ${{ matrix.flags }} -o run_tests tests/test_main.cpp
          ./run_tests

      - name: End-to-end smoke test
        run: |
          mkdir e2e
          cd e2e
          printf '1\nBuy milk\n\n2\n\n5\n' | ../todo
          grep -q '0|Buy milk' tasks.txt
          echo "e2e OK: a task round-tripped through the real binary"
